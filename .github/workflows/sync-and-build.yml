name: Sync, Build and Push OpenWA

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout tu fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sincronizar con el repo original
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/rmyndharis/OpenWA.git
          git fetch upstream
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Sin cambios, no se buildea"
          else
            git merge upstream/main --no-edit --allow-unrelated-histories || true
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/fer336/OpenWA.git main --force-with-lease
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Cambios detectados, se buildea"
          fi

      - name: Login to GitHub Container Registry
        if: steps.sync.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.sync.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/fer336/openwa:latest

      - name: Redeploy en Portainer
        if: steps.sync.outputs.changed == 'true'
        run: |
          curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}
