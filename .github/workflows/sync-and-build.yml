name: Sync, Build and Push OpenWA

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Forzar build aunque no haya cambios'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tu fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sincronizar con upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/rmyndharis/OpenWA.git
          git fetch upstream main
          UPSTREAM_COMMITS=$(git log HEAD..upstream/main --oneline | wc -l)
          echo "Commits nuevos: $UPSTREAM_COMMITS"
          if [ "$UPSTREAM_COMMITS" -gt "0" ]; then
            git merge upstream/main --no-edit --strategy-option=theirs
            git push origin main --force
          else
            echo "Sin cambios, nada que pushear"
          fi

  build:
    runs-on: ubuntu-latest
    needs: sync
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/fer336/openwa:latest

      - name: Redeploy en Portainer
        run: |
          curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}
